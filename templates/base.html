{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LuxeNest{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="{% static 'css/luxenest.css' %}" rel="stylesheet">
</head>
<body>
  {% include "includes/navbar.html" %}
  <div class="toast-wrap">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }} shadow-sm luxe-toast" data-auto-dismiss="5200" role="alert">
        <span>{{ message }}</span>
        <button type="button" class="toast-close" aria-label="Close message">&times;</button>
      </div>
    {% endfor %}
  </div>
  <main>{% block content %}{% endblock %}</main>
  {% include "includes/ai_chat.html" %}
  {% include "includes/footer.html" %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/luxenest.js' %}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
