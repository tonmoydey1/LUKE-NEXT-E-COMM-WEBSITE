<div style="margin:0;background:#f5f8fc;padding:28px 0;font-family:Inter,Arial,sans-serif;color:#0f172a">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;margin:0 auto;background:#ffffff;border:1px solid #e5eaf3;border-radius:14px;overflow:hidden">
    <tr><td style="background:#062f69;padding:28px;color:#ffffff;border-bottom:5px solid #d7a928"><h1 style="margin:0;color:#ffffff">Verify your LuxeNest account</h1></td></tr>
    <tr><td style="padding:28px">
      <p>Hello {{ user.first_name|default:user.username }}, use this OTP to verify your account.</p>
      <div style="letter-spacing:10px;text-align:center;background:#fff8df;border:1px solid #f0d77a;border-radius:12px;padding:18px;font-size:34px;font-weight:900;color:#062f69">{{ otp.code }}</div>
      <p style="color:#667085">This code expires in 10 minutes. Do not share it with anyone.</p>
    </td></tr>
  </table>
</div>
