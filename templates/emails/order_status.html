<div style="margin:0;background:#f5f8fc;padding:28px 0;font-family:Inter,Arial,sans-serif;color:#0f172a">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px;margin:0 auto;background:#ffffff;border:1px solid #e5eaf3;border-radius:14px;overflow:hidden">
    <tr><td style="background:#0b4aa2;padding:28px;color:#ffffff;border-bottom:5px solid #d7a928"><h1 style="margin:0;color:#ffffff">Order status updated</h1><p style="margin:8px 0 0;color:#eaf2ff">{{ order.order_id }}</p></td></tr>
    <tr><td style="padding:28px">
      <div style="background:#eef4ff;border:1px solid #dbe4f0;border-radius:10px;padding:16px"><strong>Current status</strong><br><span style="font-size:22px;color:#062f69;font-weight:900">{{ order.get_status_display }}</span></div>
      <p style="margin:18px 0;color:#334155">{{ event.note }}</p>
      {% if event.location %}<p style="color:#667085"><strong>Location:</strong> {{ event.location }}</p>{% endif %}
    </td></tr>
    <tr><td style="padding:18px 28px;background:#08111f;color:#cbd5e1;font-size:13px">LuxeNest Support: tonmoydeyrick@gmail.com</td></tr>
  </table>
</div>
